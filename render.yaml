services:
  - type: web
    name: crimeatlas-api
    env: python
    plan: free
    runtime: python-3.13
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: FLASK_ENV
        value: production
